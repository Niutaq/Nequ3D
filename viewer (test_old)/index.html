<!doctype html>
<html lang="pl">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>OpenUSD Pipeline Viewer</title>
        <script
            type="module"
            src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"
        ></script>
        <style>
            body {
                margin: 0;
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
                background: #111;
                color: #fff;
                display: flex;
                flex-direction: column;
                align-items: center;
                height: 100vh;
            }
            header {
                margin: 20px;
                text-align: center;
            }
            #canvas-container {
                width: 80%;
                height: 65vh;
                background: #1a1a1a;
                border-radius: 12px;
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
                overflow: hidden;
            }
            model-viewer {
                width: 100%;
                height: 100%;
            }
            #meta {
                margin-top: 15px;
                font-size: 0.9em;
                color: #aaa;
            }
        </style>
    </head>
    <body>
        <header>
            <h1>Pipeline OpenUSD Showcase</h1>
            <p>Status: Połączono z backendem Go</p>
        </header>

        <div id="canvas-container">
            <model-viewer
                id="usd-render"
                src="/raw/test_glb.glb"
                ios-src="/raw/test_usdz.usdz"
                alt="Model 3D Pipeline Showcase"
                auto-rotate
                camera-controls
                ar
            >
            </model-viewer>
        </div>
    </body>
</html>
